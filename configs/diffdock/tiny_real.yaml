# Five-complex real DiffDock inference run over a tiny real PDBBind manifest.

experiment:
  name: diffdock_tiny_real
  model: diffdock
  mode: tiny_real_baseline
  seed: 42

dataset:
  name: pdbbind
  split: tiny_real
  manifest_path: data/processed/diffdock/manifests/tiny_real_manifest.json

evaluation:
  rmsd_threshold: 2.0

generation:
  backend: diffdock
  num_samples: 1
  use_confidence_reranking: false

diffdock:
  repo_dir: external/DiffDock
  config_path: external/DiffDock/default_inference_args.yaml
  timeout_seconds: 900
  command_template:
    - "{python_executable}"
    - -m
    - inference
    - --config
    - "{config_path}"
    - --protein_path
    - "{protein_path}"
    - --ligand_description
    - "{ligand_path}"
    - --out_dir
    - "{raw_output_dir}"
    - --samples_per_complex
    - "{num_samples}"
    - --batch_size
    - "1"
