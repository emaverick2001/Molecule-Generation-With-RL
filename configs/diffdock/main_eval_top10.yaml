# Fixed main-evaluation DiffDock top-10 run.
#
# Create data/processed/diffdock/manifests/main_eval_manifest.json first with:
#   uv run python scripts/freeze_evaluation_protocol.py \
#     --source-run-dir artifacts/runs/<baseline_run_id> \
#     --name main_eval \
#     --exist-ok

experiment:
  name: diffdock_main_eval
  model: diffdock
  mode: main_eval_top10_baseline
  seed: 42

dataset:
  name: pdbbind
  split: main_eval
  manifest_path: data/processed/diffdock/manifests/main_eval_manifest.json

evaluation:
  rmsd_threshold: 2.0

generation:
  backend: diffdock
  num_samples: 10
  use_confidence_reranking: false

diffdock:
  repo_dir: external/DiffDock
  config_path: external/DiffDock/default_inference_args.yaml
  timeout_seconds: 1800
  preflight_filter:
    enabled: true
    remove_hs: true
    min_protein_atoms: 1
    min_protein_residues: 1
    min_protein_chains: 1
    max_ligand_protein_centroid_distance: 80.0
    max_input_reference_centroid_distance: 2.0
    fail_on_unsupported_residues: false
  command_template:
    - "{python_executable}"
    - -m
    - inference
    - --config
    - "{config_path}"
    - --protein_path
    - "{protein_path}"
    - --ligand_description
    - "{ligand_path}"
    - --out_dir
    - "{raw_output_dir}"
    - --samples_per_complex
    - "{num_samples}"
    - --batch_size
    - "1"
